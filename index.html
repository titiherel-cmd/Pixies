<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2d1b4e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<title>Pixies — Score</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Nunito:wght@400;600;700;800&display=swap');

  :root {
    --bg: #1a0f2e;
    --surface: #231540;
    --card: #2d1b55;
    --accent: #b06aff;
    --accent2: #ff9ecd;
    --gold: #ffd166;
    --text: #f0e6ff;
    --muted: #9580b8;
    --orange: #ff9a45;
    --radius: 14px;
    --shadow: 0 4px 24px rgba(0,0,0,0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
  }

  h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.8rem;
    text-align: center;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }

  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 20px;
    letter-spacing: 0.05em;
  }

  /* ── Setup ── */
  #setup-screen { max-width: 420px; margin: 0 auto; }

  .setup-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow);
  }

  .setup-card h2 {
    font-size: 1rem; color: var(--accent); margin-bottom: 16px;
    text-transform: uppercase; letter-spacing: 0.1em;
  }

  .player-inputs { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }

  .player-input-row { display: flex; align-items: center; gap: 10px; }

  .player-dot {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 0.85rem; flex-shrink: 0;
  }

  input[type="text"] {
    flex: 1;
    background: var(--bg);
    border: 2px solid var(--card);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus { border-color: var(--accent); }

  .btn-add-player {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 11px;
    background: transparent;
    border: 2px dashed var(--muted);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem; font-weight: 700;
    cursor: pointer; margin-bottom: 20px;
    transition: all 0.15s;
  }
  .btn-add-player:hover { border-color: var(--accent); color: var(--accent); }

  .btn-remove {
    width: 30px; height: 30px; border-radius: 50%;
    background: rgba(255,92,122,0.15);
    border: none; color: #ff5c7a;
    font-size: 1.1rem; font-weight: 800;
    cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .btn-remove:hover { background: rgba(255,92,122,0.3); }

  .btn-primary {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--accent), #7c3aff);
    border: none; border-radius: var(--radius);
    color: #fff; font-family: 'Nunito', sans-serif;
    font-size: 1.1rem; font-weight: 800;
    cursor: pointer; letter-spacing: 0.05em;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:active { transform: scale(0.98); }

  /* ── Game screen ── */
  #game-screen { max-width: 600px; margin: 0 auto; }

  .round-indicator {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-bottom: 20px;
  }

  .round-pip {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--card); border: 2px solid var(--muted);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 0.9rem; color: var(--muted);
    transition: all 0.2s; cursor: default;
  }
  .round-pip.active  { border-color: var(--accent); color: var(--accent); background: rgba(176,106,255,0.15); }
  .round-pip.done    { border-color: var(--gold); color: var(--gold); background: rgba(255,209,102,0.1); cursor: pointer; }
  .round-pip.done:hover { background: rgba(255,209,102,0.2); }

  .round-label { font-size: 0.85rem; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; }

  /* Player cards */
  .players-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }

  .player-score-card {
    background: var(--surface); border-radius: var(--radius);
    padding: clamp(10px, 3vw, 16px); box-shadow: var(--shadow);
    border: 2px solid transparent; transition: border-color 0.15s;
  }

  .player-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .player-name-display { font-weight: 800; font-size: 1rem; }

  .total-badge {
    margin-left: auto; background: var(--card);
    border-radius: 20px; padding: 4px 14px;
    font-weight: 800; font-size: 1.1rem; color: var(--gold);
  }

  .score-inputs {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
  }

  .score-field { display: flex; flex-direction: column; gap: 4px; min-width: 0; }

  .score-label {
    font-size: clamp(0.6rem, 2vw, 0.72rem); color: var(--muted); font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.04em;
    display: flex; align-items: center; gap: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* Stepper input (+/-) */
  .stepper {
    display: flex; align-items: center;
    background: var(--bg); border: 2px solid var(--card);
    border-radius: 10px; overflow: hidden; width: 100%;
  }
  .stepper:focus-within { border-color: var(--accent); }

  .step-btn {
    flex: 0 0 clamp(28px, 8vw, 36px);
    background: none; border: none;
    color: var(--muted); font-size: clamp(1rem, 3vw, 1.2rem); font-weight: 800;
    cursor: pointer; padding: 0;
    height: clamp(36px, 10vw, 44px);
    display: flex; align-items: center; justify-content: center;
    transition: color 0.1s, background 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .step-btn:hover { color: var(--accent); background: rgba(176,106,255,0.1); }
  .step-btn:active { background: rgba(176,106,255,0.2); }

  .step-val {
    flex: 1; background: none; border: none;
    color: var(--text); font-family: 'Nunito', sans-serif;
    font-size: clamp(0.9rem, 3vw, 1.1rem); font-weight: 700;
    text-align: center; outline: none;
    -moz-appearance: textfield; padding: 0;
    min-width: 0; width: 100%;
  }
  .step-val::-webkit-inner-spin-button,
  .step-val::-webkit-outer-spin-button { -webkit-appearance: none; }

  .round-subtotal {
    margin-top: 10px; display: flex; justify-content: flex-end;
    font-size: 0.85rem; color: var(--muted); font-weight: 600;
  }
  .round-subtotal span { color: var(--text); font-weight: 800; margin-left: 4px; }

  /* Zone hint */
  .zone-hint {
    background: var(--card); border-radius: 10px;
    padding: 10px 14px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
    font-size: 0.82rem; color: var(--muted);
  }
  .zone-hint strong { color: var(--accent); }

  /* Action buttons */
  .action-row { display: flex; gap: 10px; margin-bottom: 20px; }

  .btn-secondary {
    flex: 1; padding: 12px;
    background: var(--surface); border: 2px solid var(--card);
    border-radius: var(--radius); color: var(--muted);
    font-family: 'Nunito', sans-serif; font-size: 0.95rem; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  .btn-next {
    flex: 2; padding: 12px;
    background: linear-gradient(135deg, var(--accent), #7c3aff);
    border: none; border-radius: var(--radius);
    color: #fff; font-family: 'Nunito', sans-serif;
    font-size: 1rem; font-weight: 800;
    cursor: pointer; transition: opacity 0.15s, transform 0.1s;
  }
  .btn-next:hover { opacity: 0.9; }
  .btn-next:active { transform: scale(0.98); }

  /* Scoreboard */
  .scoreboard { background: var(--surface); border-radius: var(--radius); padding: 16px; margin-bottom: 20px; }
  .scoreboard h3 { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; margin-bottom: 12px; }

  .sb-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .sb-row:last-child { border-bottom: none; }
  .sb-name { flex: 1; font-weight: 700; font-size: 0.95rem; }
  .sb-rounds { display: flex; gap: 6px; }
  .sb-r { min-width: 36px; text-align: center; font-size: 0.82rem; color: var(--muted); font-weight: 600; }
  .sb-r.has-score { color: var(--text); }
  .sb-total { font-weight: 800; font-size: 1rem; color: var(--gold); min-width: 40px; text-align: right; }

  /* ── Classement intermédiaire (modal) ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
    animation: fadeIn 0.2s ease;
  }

  .modal-box {
    background: var(--surface); border-radius: var(--radius);
    padding: 28px 24px; width: 100%; max-width: 380px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.7);
    animation: slideUp 0.25s ease;
  }

  .modal-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.1rem; text-align: center; margin-bottom: 6px;
    background: linear-gradient(135deg, var(--gold), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .modal-subtitle { text-align: center; color: var(--muted); font-size: 0.82rem; margin-bottom: 20px; }

  .modal-rankings { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }

  .modal-rank-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--card); border-radius: 10px; padding: 10px 14px;
  }
  .modal-rank-pos { font-size: 1.3rem; min-width: 28px; }
  .modal-rank-name { flex: 1; font-weight: 700; }
  .modal-rank-round { font-size: 0.8rem; color: var(--muted); margin-right: 6px; }
  .modal-rank-total { font-weight: 800; font-size: 1.1rem; color: var(--gold); }

  /* Results screen */
  #results-screen { max-width: 420px; margin: 0 auto; }

  .result-card { background: var(--surface); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); margin-bottom: 16px; }

  .winner-banner { text-align: center; margin-bottom: 24px; }
  .winner-emoji { font-size: 3rem; margin-bottom: 8px; }
  .winner-name {
    font-family: 'Cinzel Decorative', serif; font-size: 1.4rem;
    background: linear-gradient(135deg, var(--gold), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .winner-score { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }

  .rankings { display: flex; flex-direction: column; gap: 8px; }
  .rank-row { display: flex; align-items: center; gap: 12px; background: var(--card); border-radius: 10px; padding: 12px 14px; }
  .rank-pos { font-size: 1.2rem; font-weight: 800; min-width: 28px; }
  .rank-name { flex: 1; font-weight: 700; }
  .rank-rounds { font-size: 0.8rem; color: var(--muted); margin-right: 8px; }
  .rank-total { font-weight: 800; font-size: 1.1rem; color: var(--gold); }

  /* Player colors */
  .p0 { background: #5ba4ff; color: #000; }
  .p1 { background: #58e09a; color: #000; }
  .p2 { background: #ffd166; color: #000; }
  .p3 { background: #ff9a45; color: #000; }
  .p4 { background: #ff5c7a; color: #fff; }

  .hidden { display: none !important; }

  @keyframes fadeIn  { from { opacity:0 } to { opacity:1 } }
  @keyframes slideUp { from { opacity:0; transform:translateY(20px) } to { opacity:1; transform:translateY(0) } }
  @keyframes pop     { 0%{transform:scale(1)} 50%{transform:scale(1.06)} 100%{transform:scale(1)} }
  .fade-in { animation: fadeIn 0.3s ease forwards; }
  .pop     { animation: pop 0.2s ease; }
</style>
</head>
<body>

<!-- ══ SETUP ══ -->
<div id="setup-screen">
  <h1>✨ Pixies</h1>
  <p class="subtitle">Compteur de points — 3 manches</p>

  <div class="setup-card">
    <h2>Joueurs</h2>
    <div class="player-inputs" id="player-inputs"></div>
    <button class="btn-add-player" id="btn-add" onclick="addPlayer()">＋ Ajouter un joueur</button>
    <button class="btn-primary" onclick="startGame()">▶ Commencer la partie</button>
  </div>
</div>

<!-- ══ GAME ══ -->
<div id="game-screen" class="hidden">
  <h1>✨ Pixies</h1>
  <div class="round-indicator" id="round-indicator"></div>
  <div class="zone-hint">🎨 <div>Zone de couleur : <strong id="zone-pts">2 pts</strong> par carte cette manche</div></div>
  <div class="players-grid" id="players-grid"></div>
  <div class="scoreboard">
    <h3>Tableau des scores</h3>
    <div id="sb-body"></div>
  </div>
  <div class="action-row">
    <button class="btn-secondary" onclick="confirmReset()">↺ Recommencer</button>
    <button class="btn-next" id="next-btn" onclick="nextRound()">Manche suivante →</button>
  </div>
</div>

<!-- ══ RESULTS ══ -->
<div id="results-screen" class="hidden">
  <h1>✨ Pixies</h1>
  <p class="subtitle">Résultats finaux</p>
  <div class="result-card fade-in">
    <div class="winner-banner" id="winner-banner"></div>
    <div class="rankings" id="rankings"></div>
  </div>
  <button class="btn-primary" onclick="newGame()">✨ Nouvelle partie</button>
</div>

<script>
const COLORS = ['p0','p1','p2','p3','p4'];
const ZONE_PTS = [2, 3, 4];
const MEDALS = ['🥇','🥈','🥉','4️⃣','5️⃣'];

let state = {
  playerCount: 2,
  names: ['', '', '', '', ''],
  currentRound: 0,
  scores: [], // [player][round] = {validated, spirals, crosses, zone}
};

/* ══ SETUP ══ */
function renderPlayerInputs() {
  const el = document.getElementById('player-inputs');
  el.innerHTML = '';
  for (let i = 0; i < state.playerCount; i++) {
    el.innerHTML += `
      <div class="player-input-row" id="prow-${i}">
        <div class="player-dot ${COLORS[i]}">${i+1}</div>
        <input type="text" id="name-${i}" value="${state.names[i]}"
          placeholder="Joueur ${i+1}" oninput="state.names[${i}]=this.value">
        ${state.playerCount > 2 ? `<button class="btn-remove" onclick="removePlayer(${i})" title="Supprimer">×</button>` : ''}
      </div>`;
  }
  document.getElementById('btn-add').style.display = state.playerCount >= 5 ? 'none' : '';
}

function addPlayer() {
  if (state.playerCount >= 5) return;
  // save current names
  for (let i = 0; i < state.playerCount; i++) {
    state.names[i] = document.getElementById(`name-${i}`)?.value || state.names[i];
  }
  state.playerCount++;
  state.names[state.playerCount-1] = '';
  renderPlayerInputs();
  document.getElementById(`name-${state.playerCount-1}`).focus();
}

function removePlayer(idx) {
  for (let i = 0; i < state.playerCount; i++) {
    state.names[i] = document.getElementById(`name-${i}`)?.value || state.names[i];
  }
  state.names.splice(idx, 1);
  state.names.push('');
  state.playerCount--;
  renderPlayerInputs();
}

function startGame() {
  for (let i = 0; i < state.playerCount; i++) {
    const v = document.getElementById(`name-${i}`)?.value.trim();
    state.names[i] = v || `Joueur ${i+1}`;
  }
  state.scores = Array.from({length: state.playerCount}, () => [null, null, null]);
  state.currentRound = 0;
  document.getElementById('setup-screen').classList.add('hidden');
  document.getElementById('game-screen').classList.remove('hidden');
  renderGame();
}

/* ══ GAME ══ */
function renderGame() {
  const r = state.currentRound;

  // Pips — les manches déjà jouées sont cliquables
  const ri = document.getElementById('round-indicator');
  ri.innerHTML = `<span class="round-label">Manche</span>`;
  for (let i = 0; i < 3; i++) {
    const cls = i < r ? 'done' : i === r ? 'active' : '';
    const click = i < r ? `onclick="goToRound(${i})"` : '';
    const title = i < r ? `title="Corriger la manche ${i+1}"` : '';
    ri.innerHTML += `<div class="round-pip ${cls}" ${click} ${title}>${i+1}</div>`;
  }

  document.getElementById('zone-pts').textContent = `${ZONE_PTS[r]} pts`;

  const nb = document.getElementById('next-btn');
  nb.textContent = r < 2 ? `Valider →` : '🏆 Résultats finaux';

  const pg = document.getElementById('players-grid');
  pg.innerHTML = '';
  for (let p = 0; p < state.playerCount; p++) {
    pg.innerHTML += buildPlayerCard(p, r);
  }

  renderScoreboard();
}

function buildPlayerCard(p, r) {
  const s = state.scores[p][r] || {validated:'', spirals:'', crosses:'', zone:''};
  return `
    <div class="player-score-card fade-in" id="card-${p}">
      <div class="player-header">
        <div class="player-dot ${COLORS[p]}">${p+1}</div>
        <span class="player-name-display">${state.names[p]}</span>
        <div class="total-badge" id="total-${p}">${getGrandTotal(p)} pts</div>
      </div>
      <div class="score-inputs">
        ${stepper('val', p, s.validated, '🃏', 'Cartes validées')}
        ${stepper('spi', p, s.spirals,   '🌀', 'Spirales')}
        ${stepper('cro', p, s.crosses,   '✖️', 'Croix (−)')}
      </div>
      <div style="margin-top:10px">
        ${stepper('zon', p, s.zone, '🎨', 'Zone de couleur')}
      </div>
      <div class="round-subtotal">Score manche : <span id="rsub-${p}">${s.validated !== '' ? calcRoundScore(toScore(s), r) : '—'}</span> pts</div>
    </div>`;
}

function stepper(prefix, p, val, icon, label) {
  const id = `${prefix}-${p}`;
  return `
    <div class="score-field">
      <div class="score-label"><span>${icon}</span> ${label}</div>
      <div class="stepper">
        <button class="step-btn" onclick="step('${prefix}',${p},-1)" type="button">−</button>
        <input class="step-val" type="number" id="${id}" value="${val}"
          placeholder="0" min="0" oninput="updateTotal(${p})">
        <button class="step-btn" onclick="step('${prefix}',${p},1)" type="button">＋</button>
      </div>
    </div>`;
}

function step(prefix, p, delta) {
  const el = document.getElementById(`${prefix}-${p}`);
  const cur = parseInt(el.value) || 0;
  const next = Math.max(0, cur + delta);
  el.value = next;
  updateTotal(p);
}

function toScore(raw) {
  return {
    validated: parseInt(raw.validated) || 0,
    spirals:   parseInt(raw.spirals)   || 0,
    crosses:   parseInt(raw.crosses)   || 0,
    zone:      parseInt(raw.zone)      || 0,
  };
}

function readPlayerInputs(p) {
  return {
    validated: document.getElementById(`val-${p}`)?.value ?? '',
    spirals:   document.getElementById(`spi-${p}`)?.value ?? '',
    crosses:   document.getElementById(`cro-${p}`)?.value ?? '',
    zone:      document.getElementById(`zon-${p}`)?.value ?? '',
  };
}

function calcRoundScore(s, r) {
  return s.validated + s.spirals - s.crosses + s.zone * ZONE_PTS[r];
}

function updateTotal(p) {
  const r = state.currentRound;
  const raw = readPlayerInputs(p);
  state.scores[p][r] = raw;
  const s = toScore(raw);
  const rs = calcRoundScore(s, r);
  const el = document.getElementById(`rsub-${p}`);
  if (el) el.textContent = rs;
  const tel = document.getElementById(`total-${p}`);
  if (tel) { tel.textContent = `${getGrandTotal(p)} pts`; tel.classList.add('pop'); setTimeout(()=>tel.classList.remove('pop'),200); }
  renderScoreboard();
}

function getGrandTotal(p) {
  let t = 0;
  for (let r = 0; r < 3; r++) {
    const raw = state.scores[p][r];
    if (raw) t += calcRoundScore(toScore(raw), r);
  }
  return t;
}

function saveCurrentRound() {
  const r = state.currentRound;
  for (let p = 0; p < state.playerCount; p++) {
    state.scores[p][r] = readPlayerInputs(p);
  }
}

function nextRound() {
  saveCurrentRound();
  if (state.currentRound < 2) {
    showIntermediateRanking(state.currentRound, () => {
      state.currentRound++;
      renderGame();
      window.scrollTo({top: 0, behavior: 'smooth'});
    });
  } else {
    showResults();
  }
}

/* Retour sur une manche précédente */
function goToRound(r) {
  saveCurrentRound();
  state.currentRound = r;
  renderGame();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

/* ══ CLASSEMENT INTERMÉDIAIRE ══ */
function showIntermediateRanking(doneRound, onContinue) {
  const ranked = Array.from({length: state.playerCount}, (_, p) => ({
    p, name: state.names[p], total: getGrandTotal(p),
    roundScore: calcRoundScore(toScore(state.scores[p][doneRound] || {}), doneRound)
  })).sort((a,b) => b.total - a.total);

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="modal-title">Manche ${doneRound+1} terminée !</div>
      <div class="modal-subtitle">Classement après ${doneRound+1} manche${doneRound>0?'s':''}</div>
      <div class="modal-rankings">
        ${ranked.map((pl,i) => `
          <div class="modal-rank-row">
            <div class="modal-rank-pos">${MEDALS[i]}</div>
            <div class="player-dot ${COLORS[pl.p]}" style="width:26px;height:26px;font-size:0.78rem">${pl.p+1}</div>
            <div class="modal-rank-name">${pl.name}</div>
            <div class="modal-rank-round">+${pl.roundScore}</div>
            <div class="modal-rank-total">${pl.total} pts</div>
          </div>`).join('')}
      </div>
      <button class="btn-primary" id="modal-continue">Manche ${doneRound+2} →</button>
    </div>`;

  document.body.appendChild(overlay);
  document.getElementById('modal-continue').onclick = () => {
    overlay.remove();
    onContinue();
  };
  // tap outside = fermer aussi
  overlay.addEventListener('click', e => { if (e.target === overlay) { overlay.remove(); onContinue(); } });
}

/* ══ SCOREBOARD ══ */
function renderScoreboard() {
  const sb = document.getElementById('sb-body');
  let html = '';
  for (let p = 0; p < state.playerCount; p++) {
    html += `<div class="sb-row">
      <div class="player-dot ${COLORS[p]}" style="width:24px;height:24px;font-size:0.75rem">${p+1}</div>
      <div class="sb-name">${state.names[p]}</div>
      <div class="sb-rounds">`;
    for (let r = 0; r < 3; r++) {
      const raw = state.scores[p][r];
      const pts = raw ? calcRoundScore(toScore(raw), r) : '—';
      html += `<div class="sb-r ${raw?'has-score':''}">${pts}</div>`;
    }
    html += `</div><div class="sb-total">${getGrandTotal(p)}</div></div>`;
  }
  sb.innerHTML = html;
}

/* ══ RESULTS ══ */
function showResults() {
  document.getElementById('game-screen').classList.add('hidden');
  document.getElementById('results-screen').classList.remove('hidden');

  const ranked = Array.from({length: state.playerCount}, (_,p) => ({
    p, name: state.names[p], total: getGrandTotal(p),
    rounds: [0,1,2].map(r => { const raw = state.scores[p][r]; return raw ? calcRoundScore(toScore(raw),r) : 0; })
  })).sort((a,b) => b.total - a.total);

  const winner = ranked[0];
  document.getElementById('winner-banner').innerHTML = `
    <div class="winner-emoji">🏆</div>
    <div class="winner-name">${winner.name}</div>
    <div class="winner-score">${winner.total} points au total</div>`;

  document.getElementById('rankings').innerHTML = ranked.map((pl,i) => `
    <div class="rank-row">
      <div class="rank-pos">${MEDALS[i]}</div>
      <div class="player-dot ${COLORS[pl.p]}" style="width:28px;height:28px;font-size:0.8rem">${pl.p+1}</div>
      <div class="rank-name">${pl.name}</div>
      <div class="rank-rounds">${pl.rounds.map((s,r)=>`M${r+1}: ${s}`).join(' · ')}</div>
      <div class="rank-total">${pl.total}</div>
    </div>`).join('');
}

/* ══ UTILS ══ */
function confirmReset() { if (confirm('Recommencer une nouvelle partie ?')) newGame(); }

function newGame() {
  document.getElementById('results-screen').classList.add('hidden');
  document.getElementById('game-screen').classList.add('hidden');
  document.getElementById('setup-screen').classList.remove('hidden');
  state.currentRound = 0;
}

/* ══ INIT ══ */
renderPlayerInputs();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
